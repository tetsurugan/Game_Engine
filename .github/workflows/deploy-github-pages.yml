# Publishes Vite dist/ to branch "gh-pages". GitHub Pages then serves that branch.
#
# Settings → Pages → Build and deployment:
#   Source: Deploy from a branch
#   Branch: gh-pages  /  / (root)
#
# URL: https://tetsurugan.github.io/Game_Engine/

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Production build (subpath /Game_Engine/)
        run: npm run build
        env:
          VITE_BASE_PATH: /Game_Engine/

      - name: SPA fallback (refresh / deep links)
        run: cp dist/index.html dist/404.html

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
