# Build and deploy the Vite SPA to GitHub Pages (project site).
# Live URL: https://tetsurugan.github.io/Game_Engine/
#
# Repo settings → Pages → Build and deployment → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm test

      - name: Production build (GitHub Pages base path)
        run: npm run build
        env:
          VITE_BASE_PATH: /Game_Engine/

      - name: SPA fallback (direct URLs / refresh)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
